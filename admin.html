<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body onload="init()">

<h2>Admin Panel</h2>

<div class="card">
<button onclick="giveMoney()">Give ₹100 to user1</button>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>

<script>
function init(){
 let user = getUser();

 if(user.role !== "admin"){
  alert("Access denied");
  window.location.href="index.html";
 }
}

function giveMoney(){
 users["user1"].balance += 100;
 alert("Added ₹100");
}
</script>

</body>
</html>
